# 复制为 application.yml 后按需设置（application.yml 勿提交到公开仓库）
# 数据库默认本机 127.0.0.1:3306 / 库名 e_commerce / 用户 root；密码请设环境变量 MYSQL_PASSWORD，或在复制后的 yml 里写本地密码（勿提交）。
server:
  port: 8080

spring:
  application:
    name: e-commerce-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 可通过环境变量覆盖：MYSQL_HOST、MYSQL_PORT、MYSQL_DATABASE、MYSQL_USERNAME、MYSQL_PASSWORD
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:e_commerce}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 3000ms

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ecommerce.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: change-me-in-production-use-long-random-string
  expiration: 86400000

pay:
  mock:
    secret: change-mock-pay-secret
  unified:
    enabled: true
    secret: change-unified-pay-secret
